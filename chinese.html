<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>繁體中文工坊</title>
  
  <!-- 引入 Tailwind CSS 框架 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel (用來在瀏覽器中即時編譯 JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 🌟🌟🌟 引入外部字庫檔案 🌟🌟🌟 -->
  <script src="word_data.js"></script>

  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    
    /* 震動動畫 (答錯時) */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-3deg); }
      75% { transform: translateX(5px) rotate(3deg); }
    }
    .animate-shake { animation: shake 0.4s ease-in-out; }
  </style>
</head>
<body class="bg-[#FDFBF7]">

  <!-- 遊戲的根節點 -->
  <div id="root"></div>

  <!-- React 程式碼 (必須標註 type="text/babel") -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // 防呆處理：如果沒有載入外部檔案，提供測試資料
    const fallbackData = [
      { char: "載", radical: "車", component: "𢦏", bopomofo: "ㄗㄞˋ", mean: "裝運。", pre: "請確認有正確載", post: "入 word_data.js" }
    ];
    const dataSource = typeof RAW_WORD_DATA !== 'undefined' ? RAW_WORD_DATA : fallbackData;

    // ==========================================
    // 💡 重要：程式化自動標籤系統
    // ==========================================
    // 內部自動去重，確保字庫純淨穩定
    const UNIQUE_WORD_DATA = Array.from(new Map(dataSource.map(item => [item.char, item])).values());

    const WORD_DATA = UNIQUE_WORD_DATA.map((item, index) => {
      let level, levelLabel, levelColor;
      const pos = index + 1;

      if (pos <= 250) {
        level = 1;
        levelLabel = "最常用字";
        levelColor = "bg-blue-500";
      } else if (pos <= 350) {
        level = 2;
        levelLabel = "常用字";
        levelColor = "bg-green-500";
      } else {
        level = 3;
        levelLabel = "一般用字";
        levelColor = "bg-purple-600";
      }

      return { ...item, level, levelLabel, levelColor };
    });

    const ALL_RADICALS = [...new Set(WORD_DATA.map(w => w.radical))];
    const ALL_COMPONENTS = [...new Set(WORD_DATA.map(w => w.component))];

    // ==========================================
    // 字典部首說明與常用字注音擴充
    // ==========================================
    const RADICAL_DESC = {
      "氵": "與水有關", "木": "樹木、木材", "扌": "手部動作", "口": "嘴巴、發聲",
      "日": "太陽、時間", "火": "火焰、熱能", "忄": "心理、情感", "貝": "金錢、財物",
      "糸": "絲線、紡織", "言": "說話、語言", "亻": "人物相關", "辶": "行走、道路",
      "艹": "植物、草本", "門": "門戶、建築", "雨": "天氣、降水", "虫": "昆蟲、爬蟲",
      "土": "土地、泥土", "鳥": "鳥類、飛禽", "魚": "魚類、水產", "金": "金屬、刀具",
      "女": "女性相關", "石": "石頭、礦物", "竹": "竹子、製品", "月": "器官、月亮",
      "目": "眼睛、觀看", "足": "腳部、行走", "車": "車輛、運輸", "馬": "馬匹、騎乘",
      "食": "食物、飲食", "心": "思想、情感", "禾": "穀物、農作", "米": "米糧、糧食",
      "衤": "衣服、布料", "礻": "祭祀、神明", "犭": "犬類、野獸", "巾": "布帛、布料",
      "酉": "酒類、發酵", "王": "美玉、珍寶", "彳": "行走、步伐", "阝": "地形、城邑",
      "山": "山脈、地形", "牜": "牛隻、牲畜", "灬": "火焰、加熱", "冫": "冰雪、寒冷",
      "止": "腳步、停止", "儿": "下方的人", "文": "文字、花紋", "羽": "鳥羽、飛翔",
      "黃": "黃色相關"
    };

    const COMMON_ZHUYIN = {
      "的":"ㄉㄜ˙", "是":"ㄕˋ", "我":"ㄨㄛˇ", "了":"ㄌㄜ˙", "在":"ㄗㄞˋ", "有":"ㄧㄡˇ", "個":"ㄍㄜ˙", "人":"ㄖㄣˊ",
      "這":"ㄓㄜˋ", "上":"ㄕㄤˋ", "們":"ㄇㄣ˙", "來":"ㄌㄞˊ", "到":"ㄉㄠˋ", "大":"ㄉㄚˋ", "裡":"ㄌㄧˇ", "說":"ㄕㄨㄛ",
      "去":"ㄑㄩˋ", "子":"ㄗˇ", "好":"ㄏㄠˇ", "你":"ㄋㄧˇ", "要":"ㄧㄠˋ", "看":"ㄎㄢˋ", "起":"ㄑㄧˇ", "也":"ㄧㄝˇ",
      "和":"ㄏㄢˋ", "那":"ㄋㄚˋ", "小":"ㄒㄧㄠˇ", "為":"ㄨㄟˋ", "多":"ㄉㄨㄛ", "下":"ㄒㄧㄚˋ", "會":"ㄏㄨㄟˋ",
      "可":"ㄎㄜˇ", "只":"ㄓˇ", "而":"ㄦˊ", "對":"ㄉㄨㄟˋ", "能":"ㄋㄥˊ", "當":"ㄉㄤ", "學":"ㄒㄩㄝˊ", "如":"ㄖㄨˊ",
      "以":"ㄧˇ", "經":"ㄐㄧㄥ", "家":"ㄐㄧㄚ", "著":"ㄓㄜ˙", "他":"ㄊㄚ", "她":"ㄊㄚ", "它":"ㄊㄚ", "爸":"ㄅㄚˋ",
      "哥":"ㄍㄜ", "弟":"ㄉㄧˋ", "飛":"ㄈㄟ", "機":"ㄐㄧ", "筆":"ㄅㄧˇ", "麼":"ㄇㄜ˙", "什":"ㄕㄣˊ", "怎":"ㄗㄣˇ",
      "樣":"ㄧㄤˋ", "條":"ㄊㄧㄠˊ", "魚":"ㄩˊ", "杯":"ㄅㄟ", "水":"ㄕㄨㄟˇ", "非":"ㄈㄟ", "常":"ㄔㄤˊ", "吃":"ㄔ",
      "飯":"ㄈㄢˋ", "前":"ㄑㄧㄢˊ", "記":"ㄐㄧˋ", "手":"ㄕㄡˇ", "夏":"ㄒㄧㄚˋ", "天":"ㄊㄧㄢ", "邊":"ㄅㄧㄢ",
      "玩":"ㄨㄢˊ", "沙":"ㄕㄚ", "跑":"ㄆㄠˇ", "步":"ㄅㄨˋ", "流":"ㄌㄧㄡˊ", "很":"ㄏㄣˇ", "喜":"ㄒㄧˇ", "歡":"ㄏㄨㄢ",
      "喝":"ㄏㄜ", "蘋":"ㄆㄧㄣˊ", "果":"ㄍㄨㄛˇ", "熱":"ㄖㄜˋ", "山":"ㄕㄢ", "一":"ㄧ", "穴":"ㄒㄩㄝˋ", "隻":"ㄓ",
      "潑":"ㄆㄛ", "不":"ㄅㄨˋ", "停":"ㄊㄧㄥˊ", "向":"ㄒㄧㄤˋ", "東":"ㄉㄨㄥ", "動":"ㄉㄨㄥˋ", "海":"ㄏㄞˇ",
      "波":"ㄅㄛ", "裝":"ㄓㄨㄤ", "媽":"ㄇㄚ", "給":"ㄍㄟˇ", "櫻":"ㄧㄥ", "片":"ㄆㄧㄢˋ", "森":"ㄙㄣ", "鳥":"ㄋㄧㄠˇ",
      "樹":"ㄕㄨˋ", "請":"ㄑㄧㄥˇ", "溫":"ㄨㄣ", "老":"ㄌㄠˇ", "師":"ㄕ", "黑":"ㄏㄟ", "寫":"ㄒㄧㄝˇ", "字":"ㄗˋ",
      "埋":"ㄇㄞˊ", "深":"ㄕㄣ", "把":"ㄅㄚˇ", "每":"ㄇㄟˇ", "早":"ㄗㄠˇ", "背":"ㄅㄟ", "書":"ㄕㄨ", "包":"ㄅㄠ",
      "冬":"ㄉㄨㄥ", "開":"ㄎㄞ", "坐":"ㄗㄨㄛˋ", "張":"ㄓㄤ", "木":"ㄇㄨˋ", "走":"ㄗㄨㄛˋ", "座":"ㄗㄨㄛˋ",
      "最":"ㄗㄨㄟˋ", "適":"ㄕˋ", "合":"ㄏㄜˊ", "心":"ㄒㄧㄣ", "娃":"ㄨㄚˊ", "操":"ㄘㄠ", "場":"ㄔㄤˇ", "籃":"ㄌㄢˊ",
      "齊":"ㄑㄧˊ", "遺":"ㄧˊ", "失":"ㄕ", "鉛":"ㄑㄧㄢ", "警":"ㄐㄧㄥˇ", "察":"ㄘㄚˊ", "偷":"ㄊㄡ", "色":"ㄙㄜˋ",
      "紙":"ㄓˇ", "從":"ㄘㄨㄥˊ", "盒":"ㄏㄜˊ", "抽":"ㄔㄡ", "衛":"ㄨㄟˋ", "生":"ㄕㄥ", "日":"ㄖˋ", "禮":"ㄌㄧˇ",
      "拿":"ㄋㄚˊ", "擦":"ㄘㄚ", "乾":"ㄍㄢ", "淨":"ㄐㄧㄥˋ", "方":"ㄈㄤ", "排":"ㄆㄞˊ", "隊":"ㄉㄨㄟˋ", "擠":"ㄐㄧˇ",
      "別":"ㄅㄧㄝˊ", "拔":"ㄅㄚˊ", "賽":"ㄙㄞˋ", "用":"ㄩㄥˋ", "力":"ㄌㄧˋ", "繩":"ㄕㄥˊ", "圖":"ㄊㄨˊ", "館":"ㄍㄨㄢˇ",
      "聲":"ㄕㄥ", "鬧":"ㄋㄠˋ", "肚":"ㄉㄨˋ", "餓":"ㄜˋ", "覺":"ㄐㄩㄝˊ", "舒":"ㄕㄨ", "服":"ㄈㄨˊ", "熄":"ㄒㄧˊ",
      "吸":"ㄒㄧ", "骨":"ㄍㄨˇ", "頭":"ㄊㄡˊ", "妹":"ㄇㄟˋ", "臺":"ㄊㄞˊ", "歌":"ㄍㄜ", "口":"ㄎㄡˇ", "渴":"ㄎㄜˇ",
      "冰":"ㄅㄧㄥ", "叫":"ㄐㄧㄠˋ", "今":"ㄐㄧㄣ", "哎":"ㄞ", "忘":"ㄨㄤˋ", "公":"ㄍㄨㄥ", "園":"ㄩㄢˊ", "朗":"ㄌㄤˇ",
      "散":"ㄙㄢˋ", "四":"ㄙˋ", "周":"ㄓㄡ", "昨":"ㄗㄨㄛˊ", "星":"ㄒㄧㄥ", "漂":"ㄆㄧㄠˋ", "亮":"ㄌㄧㄤˋ", "關":"ㄍㄨㄢ",
      "房":"ㄈㄤˊ", "曬":"ㄕㄞˋ", "店":"ㄉㄧㄢˋ", "興":"ㄒㄧㄥ", "電":"ㄉㄧㄢˋ", "盤":"ㄆㄢˊ", "年":"ㄋㄧㄢˊ", "放":"ㄈㄤˋ",
      "鞭":"ㄅㄧㄢ", "脆":"ㄘㄨㄟˋ", "雞":"ㄐㄧ", "全":"ㄑㄩㄢˊ", "剛":"ㄍㄤ", "箱":"ㄒㄧㄤ", "麵":"ㄇㄧㄢˋ", "香":"ㄒㄧㄤ",
      "災":"ㄗㄞ", "冒":"ㄇㄠˋ", "出":"ㄔㄨ", "濃":"ㄋㄨㄥˊ", "柴":"ㄔㄞˊ", "錯":"ㄘㄨㄛˋ", "事":"ㄕˋ", "惹":"ㄖㄜˇ", "幫":"ㄅㄤ"
    };

    const GLOBAL_ZHUYIN_DICT = { ...COMMON_ZHUYIN };
    WORD_DATA.forEach(w => {
      if (!GLOBAL_ZHUYIN_DICT[w.char]) {
        GLOBAL_ZHUYIN_DICT[w.char] = w.bopomofo;
      }
    });

    const shuffleArray = (arr) => [...arr].sort(() => 0.5 - Math.random());

    // ==========================================
    // 智慧文字結構辨識系統
    // ==========================================
    const getWordLayout = (char, radical) => {
      const topRadicals = ["雨", "竹", "艹", "門"];
      const topRadicalChars = ["早", "旱", "晨", "景", "運", "崩", "崇", "崖", "炭", "岩", "魯", "習", "翠", "翡", "翼", "森", "李", "正"];
      
      const bottomRadicals = ["心", "灬"];
      const bottomRadicalChars = ["普", "智", "暫", "災", "炎", "壁", "塵", "鷺", "鴛", "鴦", "鯊", "姿", "盲", "駕", "驚", "翁"];
      
      const rightRadicalChars = ["那", "邦", "部", "都", "鄉", "郵", "鄰", "郊", "郁", "鄙", "邱", "邵", "邢", "郝", "郭", "鄒", "鄧", "鄭"];

      if (topRadicals.includes(radical) || topRadicalChars.includes(char)) {
        return { layout: 'tb', radPos: 'top' };
      }
      if (bottomRadicals.includes(radical) || bottomRadicalChars.includes(char)) {
        return { layout: 'tb', radPos: 'bottom' };
      }
      if (rightRadicalChars.includes(char)) {
        return { layout: 'lr', radPos: 'right' };
      }
      
      return { layout: 'lr', radPos: 'left' };
    };

    // ==========================================
    // 共用元件：專業直式注音排版
    // ==========================================
    const VerticalZhuyin = ({ bopomofo, size = "md" }) => {
      if (!bopomofo) return null;
      const chars = bopomofo.split('');
      const tone = chars.find(c => ['ˊ', 'ˇ', 'ˋ', '˙'].includes(c));
      const phonetics = chars.filter(c => !['ˊ', 'ˇ', 'ˋ', '˙'].includes(c));
      const sizeClasses = { xs: "text-xs md:text-sm", sm: "text-sm md:text-base", md: "text-lg", lg: "text-2xl", xl: "text-3xl" };

      return (
        <div className={`relative inline-flex flex-col items-center justify-center font-sans ${sizeClasses[size]}`}>
          {tone === '˙' && <span className="absolute -top-[0.9em] text-[0.8em] leading-none">˙</span>}
          <div className="flex flex-col items-center leading-tight tracking-widest">
            {phonetics.map((c, idx) => <span key={idx} className="block text-[1em]">{c}</span>)}
          </div>
          {tone && tone !== '˙' && (
             <span className="absolute top-1/2 -right-[0.8em] -translate-y-1/2 text-[0.9em] leading-none">{tone}</span>
          )}
        </div>
      );
    };

    // ==========================================
    // 共用元件：動態渲染帶注音的句子片段
    // ==========================================
    const SentencePart = ({ text, showZhuyin }) => {
      return (
        <span className="inline-flex flex-wrap items-end whitespace-pre-wrap">
          {text.split('').map((char, idx) => {
            const isPunctuation = /[，。！？、；：「」『』]/.test(char);
            const zhuyin = GLOBAL_ZHUYIN_DICT[char];
            
            if (showZhuyin && zhuyin && !isPunctuation) {
              return (
                <span key={idx} className="inline-flex items-end mx-[1px] md:mx-[2px] leading-none">
                  <span className="text-3xl md:text-5xl pb-[2px]">{char}</span>
                  <span className="ml-[1px] pb-[4px]">
                    <VerticalZhuyin bopomofo={zhuyin} size="sm" />
                  </span>
                </span>
              );
            }
            return <span key={idx} className="leading-none pb-[2px]">{char}</span>;
          })}
        </span>
      );
    };

    // ==========================================
    // 共用元件：內嵌互動雙拼框 (Mode4用)
    // ==========================================
    const InteractiveWordSlot = ({ 
      char, bopomofo, isRevealed, 
      slotRadical, slotComponent, 
      onClearRadical, onClearComponent, 
      status, radicalAns, componentAns 
    }) => {
      const layoutInfo = getWordLayout(char, radicalAns);
      const isTB = layoutInfo.layout === 'tb';
      const isRadTop = layoutInfo.radPos === 'top';
      const isRadRight = layoutInfo.radPos === 'right';

      const renderSlot = (type, val, ans, onClick, label, positionClasses) => {
        const activeColor = type === 'radical' ? 'bg-blue-100 border-blue-400 text-blue-700' : 'bg-green-100 border-green-400 text-green-700';
        const textSize = isTB ? "text-2xl md:text-4xl leading-none" : "text-3xl md:text-5xl";
        return (
          <div onClick={onClick} className={`flex items-center justify-center font-bold cursor-pointer transition-all ${positionClasses}
              ${val ? `${activeColor} shadow-inner` : 'bg-gray-50 border-dashed border-gray-300 text-gray-400 hover:bg-gray-100'}
              ${status === 'error' && val !== ans ? 'bg-red-100 border-red-400 text-red-500' : ''}`}>
            {val ? <span className={textSize}>{val}</span> : <span className="text-[10px] md:text-xs opacity-60">{label}</span>}
          </div>
        );
      };

      return (
        <div className="inline-flex items-end mx-2 align-bottom">
          <div className={`flex items-center justify-center min-w-[80px] md:min-w-[120px] h-[70px] md:h-[100px] border-b-4 
            ${isRevealed ? 'border-green-500 border-solid' : 'border-amber-500 border-dashed'} pb-1`}>
            {isRevealed ? (
              <span className="text-5xl md:text-7xl font-bold text-green-600 animate-bounce">{char}</span>
            ) : (
              <div className={`flex justify-center items-center h-full w-full gap-[2px] px-1 py-1 ${isTB ? 'flex-col' : 'flex-row'}`}>
                {isTB ? (
                  isRadTop ? (
                    <>{renderSlot('radical', slotRadical, radicalAns, onClearRadical, '上部首', 'flex-1 w-full rounded-t-md border-2 border-b-[1px]')}
                      {renderSlot('component', slotComponent, componentAns, onClearComponent, '下偏旁', 'flex-1 w-full rounded-b-md border-2 border-t-[1px]')}</>
                  ) : (
                    <>{renderSlot('component', slotComponent, componentAns, onClearComponent, '上偏旁', 'flex-1 w-full rounded-t-md border-2 border-b-[1px]')}
                      {renderSlot('radical', slotRadical, radicalAns, onClearRadical, '下部首', 'flex-1 w-full rounded-b-md border-2 border-t-[1px]')}</>
                  )
                ) : (
                  isRadRight ? (
                    <>{renderSlot('component', slotComponent, componentAns, onClearComponent, '左偏旁', 'flex-1 h-full rounded-l-md border-2 border-r-[1px]')}
                      {renderSlot('radical', slotRadical, radicalAns, onClearRadical, '右部首', 'flex-1 h-full rounded-r-md border-2 border-l-[1px]')}</>
                  ) : (
                    <>{renderSlot('radical', slotRadical, radicalAns, onClearRadical, '左部首', 'flex-1 h-full rounded-l-md border-2 border-r-[1px]')}
                      {renderSlot('component', slotComponent, componentAns, onClearComponent, '右偏旁', 'flex-1 h-full rounded-r-md border-2 border-l-[1px]')}</>
                  )
                )}
              </div>
            )}
          </div>
          <div className={`ml-1 mb-1 flex items-center justify-center font-medium ${isRevealed ? 'text-green-600' : 'text-amber-600'}`}>
            <VerticalZhuyin bopomofo={bopomofo} />
          </div>
        </div>
      );
    };

    // ==========================================
    // 【全新遊戲】選字填空 (簡單版) - 8選項 2x4排版
    // ==========================================
    const EasyModeGame = ({ goHome }) => {
      const [questions, setQuestions] = useState([]);
      const [qIndex, setQIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [attempts, setAttempts] = useState(0);
      const [wrongPicks, setWrongPicks] = useState([]);
      const [gameState, setGameState] = useState('playing'); // playing, correct, failed, finished
      const [options, setOptions] = useState([]);
      
      const [showFullZhuyin, setShowFullZhuyin] = useState(false);

      useEffect(() => {
        const selectedQuestions = shuffleArray(WORD_DATA).slice(0, 10);
        setQuestions(selectedQuestions);
        if(selectedQuestions.length > 0) loadQuestionData(selectedQuestions[0]);
      }, []);

      const loadQuestionData = (question) => {
        setAttempts(0);
        setWrongPicks([]);
        setGameState('playing');
        
        const targetWord = question.char;
        let generatedOptions = [targetWord];

        // 干擾選項 1：相似字 (同音/同部首/同偏旁)
        let similarCandidates = WORD_DATA.filter(w => 
          w.char !== targetWord && 
          (w.bopomofo === question.bopomofo || w.radical === question.radical || w.component === question.component)
        ).map(w => w.char);
        
        similarCandidates = shuffleArray(similarCandidates);
        generatedOptions.push(...similarCandidates.slice(0, 5)); // 最多取 5 個相似字

        // 干擾選項 2：隨機字補滿 8 個 (因為改為 2x4 排版)
        const neededRandoms = 8 - generatedOptions.length;
        let randomCandidates = WORD_DATA.filter(w => !generatedOptions.includes(w.char)).map(w => w.char);
        randomCandidates = shuffleArray(randomCandidates);
        generatedOptions.push(...randomCandidates.slice(0, neededRandoms));

        setOptions(shuffleArray(generatedOptions));
      };

      const handleGuess = (pick) => {
        if (gameState !== 'playing' || wrongPicks.includes(pick)) return;
        const currentQ = questions[qIndex];

        if (pick === currentQ.char) {
          const points = attempts === 0 ? 10 : attempts === 1 ? 8 : 5;
          setScore(s => s + points);
          setGameState('correct');
          setTimeout(() => nextQuestion(), 1500);
        } else {
          const newAttempts = attempts + 1;
          setAttempts(newAttempts);
          setWrongPicks([...wrongPicks, pick]);

          if (newAttempts >= 3) {
            setGameState('failed');
            setTimeout(() => nextQuestion(), 2500);
          }
        }
      };

      const nextQuestion = () => {
        if (qIndex + 1 < 10) {
          setQIndex(prev => prev + 1);
          loadQuestionData(questions[qIndex + 1]);
        } else {
          setGameState('finished');
        }
      };

      if (questions.length === 0) return <div className="p-10 font-bold text-xl">載入題庫中...</div>;

      if (gameState === 'finished') {
        return (
          <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-6">
            <h2 className="text-4xl font-bold text-blue-800">遊戲結束！</h2>
            <div className="text-6xl animate-bounce">🎯</div>
            <p className="text-2xl font-bold text-blue-700">你的總分是：{score} 分</p>
            <button onClick={goHome} className="mt-8 px-6 py-3 bg-blue-500 text-white text-xl font-bold rounded-full shadow-lg hover:bg-blue-600">回主選單</button>
          </div>
        );
      }

      const currentQ = questions[qIndex];

      return (
        <div className="flex flex-col items-center w-full max-w-5xl">
          <div className="sticky top-0 z-30 w-full bg-[#FDFBF7] -mt-6 pt-6 pb-4 shadow-[0_10px_15px_-15px_rgba(0,0,0,0.1)]">
            
            {/* 注音開關 */}
            <div className="w-full flex justify-end mb-2 pr-1">
              <label className="flex items-center cursor-pointer gap-2 text-emerald-700 font-bold bg-emerald-50 px-3 py-1.5 rounded-lg border-2 border-emerald-200 hover:bg-emerald-100 transition-colors shadow-sm">
                <input type="checkbox" checked={showFullZhuyin} onChange={(e) => setShowFullZhuyin(e.target.checked)} className="w-4 h-4 rounded text-emerald-600 cursor-pointer" />
                <span className="text-sm">📖 標示全句注音</span>
              </label>
            </div>

            {/* 狀態列 */}
            <div className="w-full flex justify-between items-center bg-blue-100 p-3 rounded-xl mb-4 font-bold text-blue-800 border-2 border-blue-300">
              <div className="flex items-center gap-2">
                <span>題數：{qIndex + 1} / 10</span>
              </div>
              <div>分數：{score} 分</div>
              <div className="text-red-500">機會：{'❤️'.repeat(3 - attempts)}{'🤍'.repeat(attempts)}</div>
            </div>

            {/* 題目區 */}
            <div className="bg-white rounded-2xl shadow-md p-4 md:p-6 w-full border-2 border-blue-200">
              <div className="flex flex-wrap justify-center items-end text-3xl md:text-5xl font-bold tracking-wide leading-relaxed">
                <SentencePart text={currentQ.pre} showZhuyin={showFullZhuyin} />
                
                {/* 簡單版填空框 */}
                <div className="inline-flex items-end mx-2 align-bottom">
                  <div className={`flex items-center justify-center min-w-[80px] md:min-w-[120px] h-[70px] md:h-[100px] border-b-4 pb-1 transition-all duration-300
                    ${gameState === 'playing' ? 'border-blue-400 border-dashed bg-blue-50/50 rounded-t-xl' : 'border-green-500 border-solid'}
                    ${gameState === 'failed' ? 'border-red-500 border-solid bg-red-50' : ''}
                  `}>
                    {gameState === 'playing' ? (
                       <VerticalZhuyin bopomofo={currentQ.bopomofo} size="xl" />
                    ) : (
                      <span className={`text-5xl md:text-7xl font-bold ${gameState === 'correct' ? 'text-green-600 animate-bounce' : 'text-red-600 animate-shake'}`}>
                        {currentQ.char}
                      </span>
                    )}
                  </div>
                </div>

                <SentencePart text={currentQ.post} showZhuyin={showFullZhuyin} />
              </div>
            </div>
          </div>

          {/* 🌟🌟選項區：8宮格 2x4 排版🌟🌟 */}
          <div className="w-full max-w-2xl mt-8 grid grid-cols-4 gap-2 md:gap-4 pb-10 px-2">
            {options.map((opt, idx) => {
              const isWrong = wrongPicks.includes(opt);
              const isCorrectRevealed = (gameState === 'failed' && opt === currentQ.char);
              
              let btnClass = "bg-white text-blue-800 border-blue-200 hover:bg-blue-100 hover:border-blue-400 active:scale-95 shadow-sm";
              
              if (isWrong) {
                btnClass = "bg-gray-100 text-gray-300 border-gray-200 opacity-50 cursor-not-allowed shadow-none";
              } else if (isCorrectRevealed) {
                btnClass = "bg-green-100 text-green-700 border-green-400 shadow-md animate-pulse";
              }

              return (
                <button
                  key={idx}
                  disabled={isWrong || gameState !== 'playing'}
                  onClick={() => handleGuess(opt)}
                  className={`flex items-center justify-center aspect-square text-4xl sm:text-5xl md:text-6xl font-bold rounded-2xl border-2 transition-all duration-200 ${btnClass}`}
                >
                  {opt}
                </button>
              );
            })}
          </div>
          
          {/* 狀態提示 */}
          <div className="fixed bottom-4 z-40 text-center w-full pointer-events-none transition-opacity duration-300">
            {gameState === 'correct' && <span className="bg-white/90 text-green-600 font-bold text-xl md:text-2xl px-6 py-2 rounded-full shadow-md">答對了！太棒了！</span>}
            {gameState === 'failed' && <span className="bg-white/90 text-red-500 font-bold text-xl md:text-2xl px-6 py-2 rounded-full shadow-md animate-shake">正確答案是這個喔！</span>}
          </div>
        </div>
      );
    };

    // ==========================================
    // 遊戲模式：情境填空 (進階部首)
    // ==========================================
    const Mode4Game = ({ goHome }) => {
      const [questions, setQuestions] = useState([]);
      const [qIndex, setQIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [slotRadical, setSlotRadical] = useState(null);
      const [slotComponent, setSlotComponent] = useState(null);
      const [attempts, setAttempts] = useState(0);
      const [hasPartialMatch, setHasPartialMatch] = useState(false);
      const [status, setStatus] = useState("idle");
      
      const [showFullZhuyin, setShowFullZhuyin] = useState(false);
      
      useEffect(() => {
        const getRandomItems = (arr, count) => [...arr].sort(() => 0.5 - Math.random()).slice(0, count);
        const level1Pool = WORD_DATA.filter(w => w.level === 1);
        const level2Pool = WORD_DATA.filter(w => w.level === 2);
        const level3Pool = WORD_DATA.filter(w => w.level === 3);

        const q1to6 = getRandomItems(level1Pool, 6);
        const q7to9 = getRandomItems(level2Pool, 3);
        const q10 = getRandomItems(level3Pool, 1);

        setQuestions([...q1to6, ...q7to9, ...q10]);
      }, []);

      const currentQ = questions[qIndex];

      const radicalOptions = useMemo(() => {
        if (!currentQ) return [];
        const others = ALL_RADICALS.filter(r => r !== currentQ.radical).sort(() => 0.5 - Math.random()).slice(0, 5);
        return [currentQ.radical, ...others].sort(() => 0.5 - Math.random());
      }, [currentQ]);

      const componentOptions = useMemo(() => {
        if (!currentQ) return [];
        const others = ALL_COMPONENTS.filter(c => c !== currentQ.component).sort(() => 0.5 - Math.random()).slice(0, 5);
        return [currentQ.component, ...others].sort(() => 0.5 - Math.random());
      }, [currentQ]);

      const checkAnswer = () => {
        if (!slotRadical || !slotComponent) return;
        const isRadRight = slotRadical === currentQ.radical;
        const isCompRight = slotComponent === currentQ.component;
        if (isRadRight || isCompRight) setHasPartialMatch(true);

        if (isRadRight && isCompRight) {
          let earned = attempts === 0 ? 10 : (attempts === 1 ? 9 : 8);
          setScore(prev => prev + earned);
          setStatus("success");
        } else {
          const newAttempts = attempts + 1;
          setAttempts(newAttempts);
          if (newAttempts >= 3) {
            setScore(prev => prev + ((isRadRight || isCompRight || hasPartialMatch) ? 5 : 0));
            setStatus("failed");
          } else {
            setStatus("error");
            setTimeout(() => { setSlotRadical(null); setSlotComponent(null); setStatus("idle"); }, 1200);
          }
        }
      };

      const nextQuestion = () => {
        if (qIndex < questions.length - 1) {
          setQIndex(prev => prev + 1);
          setAttempts(0);
          setHasPartialMatch(false);
          setSlotRadical(null);
          setSlotComponent(null);
          setStatus("idle");
        } else { setStatus("gameover"); }
      };

      if (!currentQ) return <div className="p-10 text-xl font-bold">載入題庫中...</div>;

      if (status === "gameover") {
        return (
          <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-6">
            <h2 className="text-4xl font-bold text-amber-800">遊戲結束！</h2>
            <div className="text-6xl animate-bounce">🏆</div>
            <p className="text-2xl font-bold text-green-700">你的總分是：{score} 分</p>
            <button onClick={goHome} className="mt-8 px-6 py-3 bg-amber-500 text-white text-xl font-bold rounded-full shadow-lg hover:bg-amber-600">回主選單</button>
          </div>
        );
      }

      const isRevealed = status === "success" || status === "failed";

      const layoutInfo = currentQ ? getWordLayout(currentQ.char, currentQ.radical) : { layout: 'lr', radPos: 'left' };
      const shouldSwapMenu = layoutInfo.radPos === 'right';

      const radicalMenu = (
        <div className="w-full bg-blue-50/80 rounded-2xl p-4 md:p-6 border-2 border-blue-200">
          <h3 className="text-center font-bold text-blue-800 mb-4 md:text-lg">🟦 選擇部首</h3>
          <div className="grid grid-cols-2 gap-2 md:gap-4">
            {radicalOptions.map(r => (
              <button key={`rad-${r}`} onClick={() => setSlotRadical(r)} disabled={isRevealed || slotRadical === r} className={`aspect-square text-5xl md:text-7xl rounded-lg font-bold shadow-sm transition-transform active:scale-95 ${slotRadical === r ? 'bg-blue-300 text-white opacity-40' : 'bg-white text-blue-700 hover:bg-blue-100 border border-blue-200 hover:border-blue-400'}`}>{r}</button>
            ))}
          </div>
        </div>
      );

      const componentMenu = (
        <div className="w-full bg-green-50/80 rounded-2xl p-4 md:p-6 border-2 border-green-200">
          <h3 className="text-center font-bold text-green-800 mb-4 md:text-lg">🟩 選擇偏旁</h3>
          <div className="grid grid-cols-2 gap-2 md:gap-4">
            {componentOptions.map(c => (
              <button key={`comp-${c}`} onClick={() => setSlotComponent(c)} disabled={isRevealed || slotComponent === c} className={`aspect-square text-5xl md:text-7xl rounded-lg font-bold shadow-sm transition-transform active:scale-95 ${slotComponent === c ? 'bg-green-300 text-white opacity-40' : 'bg-white text-green-700 hover:bg-green-100 border border-green-200 hover:border-green-400'}`}>{c}</button>
            ))}
          </div>
        </div>
      );

      return (
        <div className="flex flex-col items-center w-full max-w-5xl">
          <div className="sticky top-0 z-30 w-full bg-[#FDFBF7] -mt-6 pt-6 pb-4 shadow-[0_10px_15px_-15px_rgba(0,0,0,0.1)]">
            
            <div className="w-full flex justify-end mb-2 pr-1">
              <label className="flex items-center cursor-pointer gap-2 text-emerald-700 font-bold bg-emerald-50 px-3 py-1.5 rounded-lg border-2 border-emerald-200 hover:bg-emerald-100 transition-colors shadow-sm">
                <input 
                  type="checkbox" 
                  checked={showFullZhuyin} 
                  onChange={(e) => setShowFullZhuyin(e.target.checked)} 
                  className="w-4 h-4 rounded text-emerald-600 focus:ring-emerald-500 cursor-pointer"
                />
                <span className="text-sm">📖 標示全句注音</span>
              </label>
            </div>

            <div className="w-full flex justify-between items-center bg-amber-100 p-3 rounded-xl mb-4 font-bold text-amber-800 border-2 border-amber-300">
              <div className="flex items-center gap-2">
                <span>題數：{qIndex + 1} / 10</span>
                <span className={`${currentQ.levelColor} text-white text-xs px-2 py-1 rounded-md shadow-sm`}>{currentQ.levelLabel}</span>
              </div>
              <div>分數：{score} 分</div>
              <div className="text-red-500">機會：{'❤️'.repeat(3 - attempts)}{'🤍'.repeat(attempts)}</div>
            </div>
            <div className="bg-white rounded-2xl shadow-md p-4 md:p-6 w-full border-2 border-amber-200">
              <div className="flex flex-wrap justify-center items-end text-3xl md:text-5xl font-bold tracking-wide leading-relaxed">
                <SentencePart text={currentQ.pre} showZhuyin={showFullZhuyin} />
                <InteractiveWordSlot char={currentQ.char} bopomofo={currentQ.bopomofo} isRevealed={isRevealed} slotRadical={slotRadical} slotComponent={slotComponent} onClearRadical={() => { if(!isRevealed) setSlotRadical(null) }} onClearComponent={() => { if(!isRevealed) setSlotComponent(null) }} status={status} radicalAns={currentQ.radical} componentAns={currentQ.component} />
                <SentencePart text={currentQ.post} showZhuyin={showFullZhuyin} />
              </div>
            </div>
          </div>

          <div className="w-full relative flex flex-col items-center mt-4 md:mt-6">
            {isRevealed && <div className="absolute inset-0 bg-white/70 z-20 rounded-2xl backdrop-blur-sm"></div>}
            <div className="w-full grid grid-cols-2 gap-4">
              {shouldSwapMenu ? (
                <>
                  {componentMenu}
                  {radicalMenu}
                </>
              ) : (
                <>
                  {radicalMenu}
                  {componentMenu}
                </>
              )}
            </div>
          </div>

          <div className="mt-8 mb-10 z-10 flex flex-col items-center w-full">
            {isRevealed ? (
              <>
                <div className={`text-2xl md:text-3xl font-bold mb-4 ${status === 'success' ? 'text-green-600' : 'text-red-600'} animate-pulse`}>{status === 'success' ? '答對了！太厲害了！' : '很可惜，正確答案是這個喔！'}</div>
                <button onClick={nextQuestion} className="px-10 py-4 rounded-full text-xl md:text-2xl font-bold text-white shadow-lg transition-transform bg-green-500 hover:bg-green-600 active:scale-95 animate-bounce">{qIndex < 9 ? '下一題 👉' : '看成績 🏆'}</button>
              </>
            ) : (
              <button onClick={checkAnswer} disabled={!slotRadical || !slotComponent || status === 'error'} className={`px-10 py-4 rounded-full text-xl md:text-2xl font-bold text-white shadow-lg transition-transform ${(!slotRadical || !slotComponent) ? 'bg-gray-400 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-600 active:scale-95'}`}>組合看看！</button>
            )}
          </div>

          <div className="fixed bottom-4 z-40 h-8 text-red-500 font-bold text-xl md:text-2xl bg-white/90 px-6 py-1 rounded-full shadow-md transition-opacity duration-300" style={{ opacity: status === "error" ? 1 : 0, pointerEvents: 'none' }}>哎呀！組合錯誤了，再試一次！</div>
        </div>
      );
    };

    // ==========================================
    // 系統功能：文字列表 (部首字典)
    // ==========================================
    const DictionaryView = ({ goHome }) => {
      const [selectedRadical, setSelectedRadical] = useState(null);
      const scrollRef = useRef(null);
      useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [selectedRadical]);

      return (
        <div className="w-full max-w-5xl bg-white rounded-2xl shadow-lg p-6 border-4 border-emerald-200 flex flex-col h-[85vh]">
          <div className="flex justify-between items-center mb-6 border-b-2 border-emerald-100 pb-4">
            <h2 className="text-2xl md:text-3xl font-bold text-emerald-800">📖 文字列表 (共 {WORD_DATA.length} 字){selectedRadical && <span className="text-emerald-600 ml-2">- 「{selectedRadical}」部</span>}</h2>
            <div className="flex gap-2">
              {selectedRadical && <button onClick={() => setSelectedRadical(null)} className="text-emerald-600 font-bold hover:text-emerald-800 bg-emerald-50 hover:bg-emerald-100 px-3 md:px-4 py-2 rounded-lg transition-colors">返回部首</button>}
              <button onClick={goHome} className="text-emerald-600 font-bold hover:text-emerald-800 bg-emerald-50 hover:bg-emerald-100 px-3 md:px-4 py-2 rounded-lg transition-colors">回首頁</button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto pr-2" ref={scrollRef}>
            {!selectedRadical ? (
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                {ALL_RADICALS.map(r => (
                  <button key={r} onClick={() => setSelectedRadical(r)} className="flex flex-col items-center justify-center p-4 rounded-2xl bg-emerald-50 text-emerald-700 hover:bg-emerald-500 hover:text-white transition-all shadow-sm active:scale-95 border-2 border-emerald-100 hover:border-emerald-500">
                    <span className="text-4xl md:text-5xl font-bold mb-2">{r}</span>
                    <div className="text-xs md:text-sm font-bold mb-1 text-center line-clamp-1">{RADICAL_DESC[r] || "漢字部首"}</div>
                    <span className="text-xs font-medium opacity-80 bg-white/50 px-2 py-0.5 rounded-full text-emerald-800">{WORD_DATA.filter(w => w.radical === r).length} 字</span>
                  </button>
                ))}
              </div>
            ) : (
              <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                {WORD_DATA.filter(w => w.radical === selectedRadical).map(w => (
              <div key={w.char} className="bg-emerald-50 rounded-xl p-4 flex items-center gap-4 shadow-sm border border-emerald-100 transition-transform hover:scale-[1.02] relative overflow-hidden">
                <div className={`absolute top-0 right-0 ${w.levelColor} text-white text-[10px] px-2 py-0.5 rounded-bl-lg font-bold shadow-sm`}>{w.levelLabel}</div>
                <div className="flex items-center justify-center bg-white min-w-[80px] h-20 rounded-lg shadow-inner text-5xl font-bold text-emerald-800 border border-emerald-200">{w.char}</div>
                <div className="flex items-center"><VerticalZhuyin bopomofo={w.bopomofo} size="lg" /></div>
                <div className="ml-3 md:ml-4 flex-1 flex flex-col justify-center">
                  <div className="text-emerald-600 text-xl md:text-2xl font-bold mb-1 md:mb-2 tracking-wider">{w.radical} ＋ {w.component}</div>
                  <div className="text-gray-800 font-medium text-lg md:text-xl leading-relaxed">{w.mean}</div>
                </div>
              </div>
            ))}
          </div>
        )}
          </div>
        </div>
      );
    };

    // ==========================================
    // 主程式 (入口)
    // ==========================================
    function App() {
      const [currentView, setCurrentView] = useState('menu');
      const renderView = () => {
        switch(currentView) {
          case 'mode5': return <EasyModeGame goHome={() => setCurrentView('menu')} />;
          case 'mode4': return <Mode4Game goHome={() => setCurrentView('menu')} />;
          case 'dictionary': return <DictionaryView goHome={() => setCurrentView('menu')} />;
          default: return (
              <div className="flex flex-col items-center justify-center w-full max-w-xl bg-white rounded-3xl shadow-xl p-8 md:p-12 border-4 border-amber-300 my-auto">
                <h1 className="text-5xl md:text-6xl font-bold text-amber-800 mb-2">繁體中文工坊</h1>
                <p className="text-xl md:text-2xl text-amber-600 mb-10 font-medium tracking-widest">部首與偏旁的鍊金術</p>
                <div className="flex flex-col gap-6 w-full">
                  <MenuBtn title="💡 選字填空 (簡單版)" sub="8選1，有注音提示最好上手！" onClick={() => setCurrentView('mode5')} color="blue" highlight />
                  <MenuBtn title="📝 情境填空 (進階版)" sub="幫句子找到對的部首與偏旁" onClick={() => setCurrentView('mode4')} color="amber" highlight />
                  <MenuBtn title="📖 文字列表" sub="預習與複習的好幫手" onClick={() => setCurrentView('dictionary')} color="emerald" />
                </div>
              </div>
            );
        }
      };

      return (
        <div className="min-h-screen bg-[#FDFBF7] font-sans text-gray-800 flex flex-col items-center justify-start py-6 px-4">
          {renderView()}
        </div>
      );
    }

    // 將 MenuBtn 稍微升級以支援藍色(簡單版按鈕)
    const MenuBtn = ({ title, sub, onClick, highlight, color = "amber" }) => {
      const themes = {
        amber: { bg: "bg-amber-50 hover:bg-amber-100 border-amber-300", text: "text-amber-800", ring: "ring-amber-400" },
        emerald: { bg: "bg-emerald-50 hover:bg-emerald-100 border-emerald-300", text: "text-emerald-800", ring: "ring-emerald-400" },
        blue: { bg: "bg-blue-50 hover:bg-blue-100 border-blue-300", text: "text-blue-800", ring: "ring-blue-400" }
      };
      const theme = themes[color] || themes.amber;
      const hlClass = highlight ? `ring-4 ${theme.ring} transform scale-105` : "";
      
      return (
        <button onClick={onClick} className={`w-full flex flex-col items-center justify-center p-6 rounded-2xl border-2 transition-all hover:shadow-md active:scale-95 ${theme.bg} ${hlClass}`}>
          <span className={`text-2xl font-bold ${theme.text} mb-2`}>{title}</span>
          <span className="text-gray-500 font-medium">{sub}</span>
        </button>
      );
    }

    // 啟動 React 應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
