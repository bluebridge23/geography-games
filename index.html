<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>綜合學習大挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
            -webkit-tap-highlight-color: transparent;
        }
        /* 隱藏滾動條 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start py-8 px-4 text-slate-100 font-sans overflow-y-auto">

    <div class="w-full max-w-lg flex flex-col items-center space-y-8">
        <!-- 標題區 -->
        <div class="text-center space-y-2">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-600/20 text-indigo-400 text-3xl mb-1 border border-indigo-500/30 shadow-[0_0_15px_rgba(79,70,229,0.5)]">
                <i class="fa-solid fa-shapes"></i>
            </div>
            <h1 class="text-3xl font-black tracking-wider text-white">綜合學習大挑戰</h1>
            <p class="text-slate-400 text-sm font-medium">智慧與趣味的 6 合 1 遊戲集</p>
        </div>

        <!-- 遊戲選單：改為兩列並排網格 -->
        <div class="w-full grid grid-cols-2 gap-4">
            
            <!-- 1. 地圖猜猜樂 -->
            <a href="map.html" class="flex flex-col items-center justify-center bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all rounded-3xl p-6 border border-slate-700 text-center shadow-lg group">
                <div class="w-14 h-14 rounded-2xl bg-blue-500/20 flex items-center justify-center text-blue-400 text-2xl mb-4 border border-blue-500/30 group-hover:bg-blue-500/30 transition-colors">
                    <i class="fa-solid fa-map-location-dot"></i>
                </div>
                <h2 class="text-lg font-bold text-white mb-1">地圖猜猜樂</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">World Quiz</p>
            </a>

            <!-- 2. 猜國旗挑戰 -->
            <a href="flags.html" class="flex flex-col items-center justify-center bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all rounded-3xl p-6 border border-slate-700 text-center shadow-lg group">
                <div class="w-14 h-14 rounded-2xl bg-green-500/20 flex items-center justify-center text-green-400 text-2xl mb-4 border border-green-500/30 group-hover:bg-green-500/30 transition-colors">
                    <i class="fa-solid fa-flag"></i>
                </div>
                <h2 class="text-lg font-bold text-white mb-1">猜國旗挑戰</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Flag Master</p>
            </a>

            <!-- 3. 中國省份猜猜樂 (排序提前) -->
            <a href="china_map.html" class="flex flex-col items-center justify-center bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all rounded-3xl p-6 border border-slate-700 text-center shadow-lg group">
                <div class="w-14 h-14 rounded-2xl bg-rose-500/20 flex items-center justify-center text-rose-400 text-2xl mb-4 border border-rose-500/30 group-hover:bg-rose-500/30 transition-colors">
                    <i class="fa-solid fa-map"></i>
                </div>
                <h2 class="text-lg font-bold text-white mb-1">中國省份</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">China Map</p>
            </a>

            <!-- 4. 漢字工坊 -->
            <a href="chinese.html" class="flex flex-col items-center justify-center bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all rounded-3xl p-6 border border-slate-700 text-center shadow-lg group">
                <div class="w-14 h-14 rounded-2xl bg-amber-500/20 flex items-center justify-center text-amber-400 text-2xl mb-4 border border-amber-500/30 group-hover:bg-amber-500/30 transition-colors">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <h2 class="text-lg font-bold text-white mb-1">漢字工坊</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Chinese Char</p>
            </a>

            <!-- 5. 尋寶大作戰 -->
            <a href="treasure.html" class="flex flex-col items-center justify-center bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all rounded-3xl p-6 border border-slate-700 text-center shadow-lg group">
                <div class="w-14 h-14 rounded-2xl bg-purple-500/20 flex items-center justify-center text-purple-400 text-2xl mb-4 border border-purple-500/30 group-hover:bg-purple-500/30 transition-colors">
                    <i class="fa-solid fa-gem"></i>
                </div>
                <h2 class="text-lg font-bold text-white mb-1">尋寶大作戰</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Treasure</p>
            </a>

            <!-- 6. 誰是牛頭王 -->
            <a href="take6_game.html" class="flex flex-col items-center justify-center bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all rounded-3xl p-6 border border-slate-700 text-center shadow-lg group">
                <div class="w-14 h-14 rounded-2xl bg-teal-500/20 flex items-center justify-center text-teal-400 text-2xl mb-4 border border-teal-500/30 group-hover:bg-teal-500/30 transition-colors">
                    <i class="fa-solid fa-cow"></i>
                </div>
                <h2 class="text-lg font-bold text-white mb-1">誰是牛頭王</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Take 6!</p>
            </a>

        </div>
        
        <div class="text-slate-500 text-[10px] font-medium pt-4 pb-8">
            v1.5.0 Android Edition
        </div>
    </div>

</body>
</html>
