<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地圖猜猜樂 - 3D 世界地理大挑戰</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- D3.js 核心庫 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #020617;}
        
        svg { outline: none; }
        
        .overlay-screen {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 國家區塊互動效果 */
        .country { transition: fill 0.3s, opacity 0.3s, stroke-width 0.3s; }
        .country:hover { fill: #f8fafc !important; cursor: pointer; opacity: 1 !important; stroke: #1e293b; stroke-width: 1.5px; }

        .flat-bg { background-color: #020617; }
        
        /* 探索模式文字樣式 (使用 paint-order 讓描邊不吃掉文字本身) */
        .label-top {
            fill: #fde047; /* 亮黃色 */
            font-size: 13px;
            font-weight: 900;
            paint-order: stroke fill;
            stroke: #000000;
            stroke-width: 3.5px;
            stroke-linecap: round;
            stroke-linejoin: round;
            text-anchor: middle;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .label-other {
            fill: #cbd5e1; /* 灰白色 */
            font-size: 8px;
            font-weight: 600;
            paint-order: stroke fill;
            stroke: #0f172a;
            stroke-width: 2px;
            text-anchor: middle;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        
        /* 自訂滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="text-slate-100">

    <!-- 讀取畫面 -->

        <p id="loading-text" class="text-blue-400 font-medium text-sm">正在建立世界百大國題庫...</p>
    </div>

    <!-- 遊戲結束畫面 -->

            <p class="text-slate-400 mb-6 font-medium">你完成了 10 個國家的探索</p>
            
            <div class="bg-slate-800 rounded-2xl p-6 mb-6 border border-slate-700">
                <p class="text-sm text-blue-400 font-bold uppercase tracking-wider mb-1">最終總分</p>
                <p class="text-6xl font-black text-blue-500"><span id="final-score">0</span><span class="text-2xl text-blue-800"> / 100</span></p>
            </div>

            <p id="rank-message" class="text-xl font-bold text-slate-200 mb-8">稱號：地理大師</p>

            <div class="flex flex-col md:flex-row gap-4">

                    再玩一次

                            <p class="font-bold text-green-500 text-[10px] md:text-xs mb-0.5">正確解答</p> 
                            <p id="correct-continent" class="font-bold text-slate-200 text-sm md:text-base">亞洲</p>
                        </div>
                        <div id="user-guess-info" class="bg-slate-800 rounded-lg md:rounded-xl p-2 md:p-3 text-center border border-slate-700 hidden w-full shadow-inner">

                </div>

            </div>
        </div>
    </div>

KR":"烏克蘭","URY":"烏拉圭","USA":"美國","UZB":"烏茲別克","VEN":"委內瑞拉","VNM":"越南","VUT":"萬那杜","YEM":"葉門","ZAF":"南非","ZMB":"尚比亞","ZWE":"辛巴威", "MLT":"馬爾他", "BHR":"巴林"

        async function init() {

            }
        }

        function assignColorsGreedy(features, colorsArray) {
            const coordMap = new Map();
            features.forEach(f => {
                if (!f.geometry) return;
                const extractCoords = (coords) => {
                    if (typeof coords[0] === 'number') {
                        const key = coords[0].toFixed(1) + ',' + coords[1].toFixed(1);
                        if (!coordMap.has(key)) coordMap.set(key, new Set());
                        coordMap.get(key).add(f.id);
                    } else { coords.forEach(extractCoords); }
                };
                extractCoords(f.geometry.coordinates);
            });

            const neighbors = {};
            features.forEach(f => neighbors[f.id] = new Set());
            coordMap.forEach(countrySet => {
                const arr = Array.from(countrySet);
                for(let i=0; i<arr.length; i++) {
                    for(let j=i+1; j<arr.length; j++) {
                        if (neighbors[arr[i]]) neighbors[arr[i]].add(arr[j]);
                        if (neighbors[arr[j]]) neighbors[arr[j]].add(arr[i]);
                    }
                }
            });

            const assignedColors = {};
            const sortedFeatures = [...features].sort((a, b) => neighbors[b.id].size - neighbors[a.id].size);

            sortedFeatures.forEach(f => {
                const usedColors = new Set();
                neighbors[f.id].forEach(n => { if (assignedColors[n] !== undefined) usedColors.add(assignedColors[n]); });
                let c = 0;
                while (usedColors.has(colorsArray[c % colorsArray.length])) { c++; if (c > 50) break; }
                assignedColors[f.id] = colorsArray[c % colorsArray.length];
            });

            return assignedColors;
        }

        async function loadMapData() {
            const geoJsonUrls = ['https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson', 'https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json'];
            for (let url of geoJsonUrls) {
                try {
                    const response = await fetch(url);
                    if (response.ok) { geoDataGlobal = await response.json(); break; }
                } catch (e) {}
            }
            if (!geoDataGlobal) throw new Error("無可用資源");

            // 補上容易被地圖遺漏的微型國家 (新加坡, 馬爾他, 巴林)
            const extraCountries = [
                { id: 'SGP', name: 'Singapore', coords: [[[103.5, 1.1], [104.2, 1.1], [104.2, 1.6], [103.5, 1.6], [103.5, 1.1]]] },
                { id: 'MLT', name: 'Malta', coords: [[[14.2, 35.8], [14.6, 35.8], [14.6, 36.1], [14.2, 36.1], [14.2, 35.8]]] },
                { id: 'BHR', name: 'Bahrain', coords: [[[50.4, 25.8], [50.8, 25.8], [50.8, 26.3], [50.4, 26.3], [50.4, 25.8]]] }
            ];
            extraCountries.forEach(ex => {
                if (!geoDataGlobal.features.some(f => f.id === ex.id)) {
                    geoDataGlobal.features.push({
                        type: "Feature", id: ex.id, properties: { name: ex.name },
                        geometry: { type: "Polygon", coordinates: ex.coords }
                    });
                }
            });

            // 將使用者提供的翻譯整合進字典，並建立探索模式的高亮名單
            const allProvidedCountries = [...top30, ...top31to70, ...top71to100];
            allProvidedCountries.forEach(c => {
                const cca3 = ISO2_TO_CCA3[c.code];
                if (cca3) {
                    ALL_COUNTRIES_ZH[cca3] = c.name;
                    TOP_100_SET.add(cca3);
                }
            });

            geoDataGlobal.features.forEach(feature => {
                if (d3.geoArea(feature) > 2 * Math.PI) {
                    if (feature.geometry.type === 'Polygon') {
                        feature.geometry.coordinates.forEach(ring => ring.reverse());
                    } else if (feature.geometry.type === 'MultiPolygon') {
                        feature.geometry.coordinates.forEach(poly => poly.forEach(ring => ring.reverse()));
                    }
                }
                feature.centroid = CENTROID_OVERRIDES[feature.id] || d3.geoCentroid(feature);
            });

            const dynamicColors = assignColorsGreedy(geoDataGlobal.features, mapColors);

            geoDataGlobal.features.forEach(feature => {
                const id = feature.id;
                const region = CCA3_TO_REGION[id] || "Unknown";
                const zhName = ALL_COUNTRIES_ZH[id] || feature.properties.name || "未知";

                mapFeaturesData[id] = {
                    feature: feature,
                    name: zhName,
                    enName: feature.properties.name || "",
                    region: region,
                    regionZh: regionTranslations[region] || region,
                    defaultColor: dynamicColors[id] || mapColors[0] 
                };
            });

            initD3Globe();
        }

        function initD3Globe() {
            const container = document.getElementById('map-container');
            const resizeObserver = new ResizeObserver(entries => {
                for (let entry of entries) {
                    const w = entry.contentRect.width;
                    const h = entry.contentRect.height;
                    if(w === 0 || h === 0) continue;

                    if(!svg) {
                        initialScale = Math.min(w, h) / 1.95; 
                        projection = d3.geoOrthographic().scale(initialScale).translate([w / 2, h / 2]).clipAngle(90).rotate(TAIWAN_COORDS); 
                        pathGenerator = d3.geoPath().projection(projection);

                        svg = d3.select("#map-container").append("svg").attr("width", w).attr("height", h).style("cursor", "grab");
                        
                        oceanCircle = svg.append("circle").attr("cx", w / 2).attr("cy", h / 2).attr("r", initialScale)
                            .style("fill", "#1e293b").style("pointer-events", "all");

                        mapGroup = svg.append("g");
                        labelsGroup = svg.append("g").attr("id", "labels-layer"); 

                        countryPaths = mapGroup.selectAll("path").data(geoDataGlobal.features).enter().append("path")
                            .attr("class", "country")
                            .attr("d", pathGenerator)
                            .attr("fill", d => mapFeaturesData[d.id]?.defaultColor || "#64748b")
                            .attr("stroke", "#1e293b")
                            .attr("stroke-width", 0.5)
                            .attr("opacity", 1)
                            .on("click", function(event, d) {
                                if(event.defaultPrevented || isExploreMode) return; 
                                handleGuess(d.id); 
                            });

                        setupInteractions();
                    } else {
                        svg.attr("width", w).attr("height", h);
                        projection.translate([w / 2, h / 2]);
                        oceanCircle.attr("cx", w / 2).attr("cy", h / 2);
                        initialScale = Math.min(w, h) / 1.95;
                        projection.scale(initialScale * currentZoom);
                        oceanCircle.attr("r", initialScale * currentZoom);
                        updateGlobe();
                    }
                }
            });
            resizeObserver.observe(container);
        }

        function setupInteractions() {
            const drag = d3.drag()
                .on("start", () => svg.style("cursor", "grabbing"))
                .on("drag", (event) => {
                    const rotate = projection.rotate();
                    const k = 70 / projection.scale(); 
                    let newLambda = rotate[0] + event.dx * k; 
                    let newPhi = rotate[1] - event.dy * k;    
                    newPhi = Math.max(-80, Math.min(80, newPhi));
                    projection.rotate([newLambda, newPhi, 0]); 
                    updateGlobe();
                })
                .on("end", () => svg.style("cursor", "grab"));
            
            svg.call(drag);

            d3ZoomBehavior = d3.zoom().scaleExtent([1, 8]).filter(event => event.type === 'wheel') 
                .on("zoom", (event) => {
                    currentZoom = event.transform.k;
                    projection.scale(initialScale * currentZoom);
                    oceanCircle.attr("r", initialScale * currentZoom);
                    updateGlobe();
                });
            
            svg.call(d3ZoomBehavior);

            let initialPinchDistance = null, initialZoomK = 1;
            svg.node().addEventListener('touchstart', e => {
                if (e.touches.length === 2) {
                    initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    initialZoomK = currentZoom;
                }
            }, {passive: false});

            svg.node().addEventListener('touchmove', e => {
                if (e.touches.length === 2 && initialPinchDistance) {
                    e.preventDefault(); 
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    let newK = Math.max(1, Math.min(initialZoomK * (dist / initialPinchDistance), 8)); 
                    svg.call(d3ZoomBehavior.transform, d3.zoomIdentity.scale(newK));
                }
            }, {passive: false});

            svg.node().addEventListener('touchend', e => { if (e.touches.length < 2) initialPinchDistance = null; });
        }

        function updateGlobe() {
            if(countryPaths) countryPaths.attr("d", pathGenerator);
            if(isExploreMode) updateLabelsVisibility();
        }

        function handleZoomIn() { if(svg) svg.transition().duration(300).call(d3ZoomBehavior.scaleBy, 1.5); }
        function handleZoomOut() { if(svg) svg.transition().duration(300).call(d3ZoomBehavior.scaleBy, 0.667); }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function generateGameQueue() {
            // 過濾並建立題庫
            const validT1 = top30.filter(c => mapFeaturesData[ISO2_TO_CCA3[c.code]]);
            const validT2 = top31to70.filter(c => mapFeaturesData[ISO2_TO_CCA3[c.code]]);
            const validT3 = top71to100.filter(c => mapFeaturesData[ISO2_TO_CCA3[c.code]]);

            const t1 = shuffle([...validT1]).slice(0, 5).map(c => ({ id: ISO2_TO_CCA3[c.code], type: '世界前 30 名' }));
            const t2 = shuffle([...validT2]).slice(0, 3).map(c => ({ id: ISO2_TO_CCA3[c.code], type: '世界第 31~70 名' }));
            const t3 = shuffle([...validT3]).slice(0, 2).map(c => ({ id: ISO2_TO_CCA3[c.code], type: '世界第 71~100 名' }));
            gameQueue = [...t1, ...t2, ...t3];
        }

        function startRound() {
            isWaitingForNext = false;
            
            if (countryPaths) {
                countryPaths.transition().duration(400)
                    .attr("fill", d => mapFeaturesData[d.id]?.defaultColor || "#64748b")
                    .attr("opacity", 1)
                    .attr("stroke", "#1e293b");
            }

            const currentItem = gameQueue[currentRound - 1];
            currentTargetId = currentItem.id;
            const targetData = mapFeaturesData[currentTargetId];
            
            const iso2 = CCA3_TO_ISO2[currentTargetId] || currentTargetId.substring(0,2).toLowerCase();

            document.getElementById('round-display').innerText = currentRound;
            document.getElementById('difficulty-badge').innerText = `第 ${currentRound} 題：${currentItem.type}`;
            document.getElementById('target-name').innerText = targetData.name;
            document.getElementById('target-flag').src = `https://flagcdn.com/w160/${iso2}.png`;
            
            document.getElementById('prompt-card').classList.remove('hidden');
            document.getElementById('result-card').classList.add('hidden');
        }

        function handleGuess(clickedId) {
            if (isWaitingForNext || !currentTargetId) return;
            
            const clickedData = mapFeaturesData[clickedId];
            if(!clickedData || !CCA3_TO_REGION[clickedId] || CCA3_TO_REGION[clickedId] === "Unknown") return; 

            isWaitingForNext = true;
            const targetData = mapFeaturesData[currentTargetId];
            
            let pointsEarned = 0; let resultType = 'wrong'; 

            if (clickedId === currentTargetId) { pointsEarned = 10; resultType = 'exact'; } 
            else if (clickedData.region === targetData.region) { pointsEarned = 7; resultType = 'continent'; } 
            else { pointsEarned = 0; resultType = 'wrong'; }

            score += pointsEarned;
            document.getElementById('score-display').innerText = score;

            highlightMapResult(clickedId, currentTargetId, resultType);
            showResultCard(clickedData, targetData, pointsEarned, resultType);
        }

        function highlightMapResult(clickedId, targetId, resultType) {
            countryPaths.transition().duration(300).attr("fill", "#64748b").attr("opacity", 0.6);

            countryPaths.filter(d => d.id === targetId || d.id === clickedId)
                .transition().duration(300).attr("opacity", 1)
                .attr("fill", d => d.id === targetId ? "#22c55e" : (resultType === 'continent' ? "#eab308" : "#ef4444"))
                .attr("stroke", "#ffffff").attr("stroke-width", 2);

            const targetFeature = mapFeaturesData[targetId].feature;
            const targetRotate = [-targetFeature.centroid[0], -targetFeature.centroid[1], 0]; 

            d3.transition().duration(1200).tween("rotate", function() {
                const r = d3.interpolate(projection.rotate(), targetRotate);
                return function(t) { projection.rotate(r(t)); updateGlobe(); };
            });
        }

        function showResultCard(clickedData, targetData, points, resultType) {
            document.getElementById('prompt-card').classList.add('hidden');
            const resultCard = document.getElementById('result-card');
            resultCard.classList.remove('hidden');

            const message = document.getElementById('result-message');
            const pointsEl = document.getElementById('result-points');
            const nextBtn = document.getElementById('next-btn');
            
            document.getElementById('correct-continent').innerText = `${targetData.name} (${targetData.regionZh})`;
            
            const userGuessInfo = document.getElementById('user-guess-info');
            const guessName = document.getElementById('guess-name');
            const guessContinent = document.getElementById('guess-continent');

            pointsEl.innerText = `+${points} 分`;
            
            if (currentRound >= totalRounds) {
                nextBtn.innerText = "查看最終成績";
            } else {
                nextBtn.innerText = "下一題";
            }

            if (resultType === 'exact') {
                message.innerHTML = `太棒了！精準命中！`;
                message.className = 'w-full text-center mt-auto text-sm md:text-lg text-green-400 font-bold md:mb-1';
                pointsEl.className = 'w-full text-center text-3xl md:text-4xl font-black mb-3 md:mb-6 text-green-400';
                userGuessInfo.classList.add('hidden');
            } else if (resultType === 'continent') {
                message.innerHTML = `位置不對，但在同一洲！`;
                message.className = 'w-full text-center mt-auto text-sm md:text-lg text-yellow-400 font-bold md:mb-1';
                pointsEl.className = 'w-full text-center text-3xl md:text-4xl font-black mb-3 md:mb-6 text-yellow-400';
                userGuessInfo.classList.remove('hidden');
                
                guessName.innerText = clickedData.name;
                guessContinent.innerText = `位於${clickedData.regionZh}`;
            } else {
                message.innerHTML = `哎呀，完全猜錯了！`;
                message.className = 'w-full text-center mt-auto text-sm md:text-lg text-red-400 font-bold md:mb-1';
                pointsEl.className = 'w-full text-center text-3xl md:text-4xl font-black mb-3 md:mb-6 text-red-400';
                userGuessInfo.classList.remove('hidden');
                
                guessName.innerText = clickedData.name;
                guessContinent.innerText = `位於${clickedData.regionZh}`;
            }
        }

        function nextRound() {
            if (currentRound >= totalRounds) {
                document.getElementById('final-score').innerText = score;
                let rank = score === 100 ? "🌍 傳說級地球大師！" : (score >= 85 ? "🗺️ 卓越的導航達人！" : (score >= 60 ? "✈️ 優秀的環球旅行家！" : (score >= 30 ? "🧭 迷路的新手背包客" : "🏠 最好還是待在家裡吧 (笑)")));
                document.getElementById('rank-message').innerText = rank;
                document.getElementById('game-over').classList.remove('hidden');
                return;
            }
            currentRound++;
            startRound();
        }

        // ================= 世界探索模式相關邏輯 =================
        function enterExploreMode() {
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('prompt-card').classList.add('hidden');
            document.getElementById('result-card').classList.add('hidden');
            document.getElementById('explore-card').classList.remove('hidden');
            
            isExploreMode = true;

            // 地圖顏色重置
            countryPaths.transition().duration(500)
                .attr("fill", d => mapFeaturesData[d.id]?.defaultColor || "#64748b")
                .attr("opacity", 1).attr("stroke", "#1e293b").attr("stroke-width", 0.5);

            // 建立國家名稱標籤
            labelsGroup.selectAll("*").remove();
            
            const labels = labelsGroup.selectAll("text")
                .data(geoDataGlobal.features.filter(d => mapFeaturesData[d.id] && d.centroid))
                .enter().append("text")
                .attr("class", d => TOP_100_SET.has(d.id) ? "label-top" : "label-other");

            labels.append("tspan").text(d => mapFeaturesData[d.id].name).attr("x", 0).attr("dy", 0);
            labels.append("tspan").text(d => mapFeaturesData[d.id].enName).attr("x", 0).attr("dy", "1.1em");

            zoomToWorld(); // 重置視角
            updateGlobe();
        }

        function updateLabelsVisibility() {
            const container = document.getElementById('map-container');
            const center = projection.invert([container.clientWidth/2, container.clientHeight/2]);
            if(!center) return;
            labelsGroup.selectAll("text")
                .attr("transform", d => {
                    const p = projection(d.centroid);
                    return p ? `translate(${p[0]},${p[1]})` : "translate(-9999,-9999)";
                })
                .style("display", d => {
                    // 只顯示位於地球面向我們這一側的國家名稱
                    const dist = d3.geoDistance(d.centroid, center);
                    return dist < (Math.PI / 2 * 0.85) ? "block" : "none";
                });
        }

        function zoomToWorld() {
            if(svg) {
                svg.transition().duration(750).call(d3ZoomBehavior.transform, d3.zoomIdentity);
                d3.transition().duration(1000).tween("rotate", function() {
                    const r = d3.interpolate(projection.rotate(), TAIWAN_COORDS);
                    return function(t) { projection.rotate(r(t)); updateGlobe(); };
                });
            }
        }

        function restartGame() {
            isExploreMode = false;
            labelsGroup.selectAll("*").remove(); 
            
            document.getElementById('explore-card').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            
            score = 0; currentRound = 1;
            document.getElementById('score-display').innerText = '0';
            
            zoomToWorld();
            generateGameQueue();
            startRound();
        }

        window.onload = init;
    </script>
</body>
</html>
