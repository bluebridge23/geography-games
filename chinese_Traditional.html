      const topRadicals = ["雨", "竹", "艹", "門"];
      const topRadicalChars = ["早", "旱", "晨", "景", "運", "崩", "崇", "崖", "炭", "岩", "魯", "習", "翠", "翡", "翼", "森", "李", "正"];
      
      const bottomRadicals = ["心", "灬"];
      const bottomRadicalChars = ["普", "智", "暫", "災", "炎", "壁", "塵", "鷺", "鴛", "鴦", "鯊", "姿", "盲", "駕", "驚", "翁"];
      
      const rightRadicalChars = ["那", "邦", "部", "都", "鄉", "郵", "鄰", "郊", "郁", "鄙", "邱", "邵", "邢", "郝", "郭", "鄒", "鄧", "鄭"];

      if (topRadicals.includes(radical) || topRadicalChars.includes(char)) {
        return { layout: 'tb', radPos: 'top' };
      }
      if (bottomRadicals.includes(radical) || bottomRadicalChars.includes(char)) {
        return { layout: 'tb', radPos: 'bottom' };
      }
      if (rightRadicalChars.includes(char)) {
        return { layout: 'lr', radPos: 'right' };
      }
      
      return { layout: 'lr', radPos: 'left' };

    const VerticalZhuyin = ({ bopomofo, size = "md" }) => {
      if (!bopomofo) return null;
      const chars = bopomofo.split('');
      const tone = chars.find(c => ['ˊ', 'ˇ', 'ˋ', '˙'].includes(c));
      const phonetics = chars.filter(c => !['ˊ', 'ˇ', 'ˋ', '˙'].includes(c));
      const sizeClasses = { xs: "text-xs md:text-sm", sm: "text-sm md:text-base", md: "text-lg", lg: "text-2xl" };

      return (
        <div className={`relative inline-flex flex-col items-center justify-center font-sans ${sizeClasses[size]}`}>
          {tone === '˙' && <span className="absolute -top-[0.9em] text-[0.8em] leading-none">˙</span>}
          <div className="flex flex-col items-center leading-tight tracking-widest">
            {phonetics.map((c, idx) => <span key={idx} className="block text-[1em]">{c}</span>)}
          </div>
          {tone && tone !== '˙' && (

      const isRadTop = layoutInfo.radPos === 'top';

        const activeColor = type === 'radical' ? 'bg-blue-100 border-blue-400 text-blue-700' : 'bg-green-100 border-green-400 text-green-700';

            {val ? <span className={textSize}>{val}</span> : <span className="text-[10px] md:text-xs opacity-60">{label}</span>}
          </div>
        );
      };

    const Mode4Game = ({ goHome }) => {
      const [questions, setQuestions] = useState([]);
      const [qIndex, setQIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [slotRadical, setSlotRadical] = useState(null);
      const [slotComponent, setSlotComponent] = useState(null);
      const [attempts, setAttempts] = useState(0);
      const [hasPartialMatch, setHasPartialMatch] = useState(false);
      const [status, setStatus] = useState("idle");
      
      // 控制全句注音的開關狀態
      const [showFullZhuyin, setShowFullZhuyin] = useState(false);
      
      useEffect(() => {
        const getRandomItems = (arr, count) => [...arr].sort(() => 0.5 - Math.random()).slice(0, count);
        const level1Pool = WORD_DATA.filter(w => w.level === 1);
        const level2Pool = WORD_DATA.filter(w => w.level === 2);
        const level3Pool = WORD_DATA.filter(w => w.level === 3);

        const q1to6 = getRandomItems(level1Pool, 6);
        const q7to9 = getRandomItems(level2Pool, 3);
        const q10 = getRandomItems(level3Pool, 1);

        setQuestions([...q1to6, ...q7to9, ...q10]);
      }, []);

      const currentQ = questions[qIndex];

      const radicalOptions = useMemo(() => {
        if (!currentQ) return [];
        const others = ALL_RADICALS.filter(r => r !== currentQ.radical).sort(() => 0.5 - Math.random()).slice(0, 5);
        return [currentQ.radical, ...others].sort(() => 0.5 - Math.random());
      }, [currentQ]);

      const componentOptions = useMemo(() => {
        if (!currentQ) return [];
        const others = ALL_COMPONENTS.filter(c => c !== currentQ.component).sort(() => 0.5 - Math.random()).slice(0, 5);
        return [currentQ.component, ...others].sort(() => 0.5 - Math.random());
      }, [currentQ]);

      const checkAnswer = () => {
        if (!slotRadical || !slotComponent) return;
        const isRadRight = slotRadical === currentQ.radical;
        const isCompRight = slotComponent === currentQ.component;
        if (isRadRight || isCompRight) setHasPartialMatch(true);

        if (isRadRight && isCompRight) {
          let earned = attempts === 0 ? 10 : (attempts === 1 ? 9 : 8);
          setScore(prev => prev + earned);
          setStatus("success");
        } else {
          const newAttempts = attempts + 1;
          setAttempts(newAttempts);
          if (newAttempts >= 3) {
            setScore(prev => prev + ((isRadRight || isCompRight || hasPartialMatch) ? 5 : 0));
            setStatus("failed");
          } else {
            setStatus("error");
            setTimeout(() => { setSlotRadical(null); setSlotComponent(null); setStatus("idle"); }, 1200);
          }
        }
      };

      const nextQuestion = () => {
        if (qIndex < questions.length - 1) {
          setQIndex(prev => prev + 1);
          setAttempts(0);
          setHasPartialMatch(false);
          setSlotRadical(null);
          setSlotComponent(null);
          setStatus("idle");
        } else { setStatus("gameover"); }
      };

      if (!currentQ) return <div className="p-10 text-xl font-bold">載入題庫中...</div>;

      if (status === "gameover") {
        return (
          <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-6">
            <h2 className="text-4xl font-bold text-amber-800">遊戲結束！</h2>
            <div className="text-6xl animate-bounce">🏆</div>
            <p className="text-2xl font-bold text-green-700">你的總分是：{score} 分</p>
            <button onClick={goHome} className="mt-8 px-6 py-3 bg-amber-500 text-white text-xl font-bold rounded-full shadow-lg hover:bg-amber-600">回主選單</button>
          </div>
        );
      }

      const isRevealed = status === "success" || status === "failed";

      const layoutInfo = currentQ ? getWordLayout(currentQ.char, currentQ.radical) : { layout: 'lr', radPos: 'left' };
      const shouldSwapMenu = layoutInfo.radPos === 'right';

      const radicalMenu = (
        <div className="w-full bg-blue-50/80 rounded-2xl p-4 md:p-6 border-2 border-blue-200">
          <h3 className="text-center font-bold text-blue-800 mb-4 md:text-lg">🟦 選擇部首</h3>
          <div className="grid grid-cols-2 gap-2 md:gap-4">
            {radicalOptions.map(r => (
              <button key={`rad-${r}`} onClick={() => setSlotRadical(r)} disabled={isRevealed || slotRadical === r} className={`aspect-square text-3xl md:text-5xl rounded-lg font-bold shadow-sm transition-transform active:scale-95 ${slotRadical === r ? 'bg-blue-300 text-white opacity-40' : 'bg-white text-blue-700 hover:bg-blue-100 border border-blue-200 hover:border-blue-400'}`}>{r}</button>
            ))}
          </div>
        </div>
      );

      const componentMenu = (
        <div className="w-full bg-green-50/80 rounded-2xl p-4 md:p-6 border-2 border-green-200">
          <h3 className="text-center font-bold text-green-800 mb-4 md:text-lg">🟩 選擇偏旁</h3>
          <div className="grid grid-cols-2 gap-2 md:gap-4">
            {componentOptions.map(c => (
              <button key={`comp-${c}`} onClick={() => setSlotComponent(c)} disabled={isRevealed || slotComponent === c} className={`aspect-square text-3xl md:text-5xl rounded-lg font-bold shadow-sm transition-transform active:scale-95 ${slotComponent === c ? 'bg-green-300 text-white opacity-40' : 'bg-white text-green-700 hover:bg-green-100 border border-green-200 hover:border-green-400'}`}>{c}</button>
            ))}
          </div>
        </div>
      );

      return (
        <div className="flex flex-col items-center w-full max-w-5xl">
          <div className="sticky top-0 z-30 w-full bg-[#FDFBF7] -mt-6 pt-6 pb-4 shadow-[0_10px_15px_-15px_rgba(0,0,0,0.1)]">
            
            {/* 右上角切換按鈕 */}
            <div className="w-full flex justify-end mb-2 pr-1">
              <label className="flex items-center cursor-pointer gap-2 text-emerald-700 font-bold bg-emerald-50 px-3 py-1.5 rounded-lg border-2 border-emerald-200 hover:bg-emerald-100 transition-colors shadow-sm">
                <input 
                  type="checkbox" 
                  checked={showFullZhuyin} 
                  onChange={(e) => setShowFullZhuyin(e.target.checked)} 
                  className="w-4 h-4 rounded text-emerald-600 focus:ring-emerald-500 cursor-pointer"
                />
                <span className="text-sm">📖 標示全句注音</span>
              </label>
            </div>

            <div className="w-full flex justify-between items-center bg-amber-100 p-3 rounded-xl mb-4 font-bold text-amber-800 border-2 border-amber-300">
              <div className="flex items-center gap-2">
                <span>題數：{qIndex + 1} / 10</span>
                <span className={`${currentQ.levelColor} text-white text-xs px-2 py-1 rounded-md shadow-sm`}>{currentQ.levelLabel}</span>
              </div>
              <div>分數：{score} 分</div>
              <div className="text-red-500">機會：{'❤️'.repeat(3 - attempts)}{'🤍'.repeat(attempts)}</div>
            </div>
            <div className="bg-white rounded-2xl shadow-md p-4 md:p-6 w-full border-2 border-amber-200">
              <div className="flex flex-wrap justify-center items-end text-2xl md:text-4xl font-bold tracking-wide leading-relaxed">
                <SentencePart text={currentQ.pre} showZhuyin={showFullZhuyin} />
                <InteractiveWordSlot char={currentQ.char} bopomofo={currentQ.bopomofo} isRevealed={isRevealed} slotRadical={slotRadical} slotComponent={slotComponent} onClearRadical={() => { if(!isRevealed) setSlotRadical(null) }} onClearComponent={() => { if(!isRevealed) setSlotComponent(null) }} status={status} radicalAns={currentQ.radical} componentAns={currentQ.component} />
                <SentencePart text={currentQ.post} showZhuyin={showFullZhuyin} />
              </div>
            </div>
          </div>

          <div className="w-full relative flex flex-col items-center mt-4 md:mt-6">
            {isRevealed && <div className="absolute inset-0 bg-white/70 z-20 rounded-2xl backdrop-blur-sm"></div>}
            <div className="w-full grid grid-cols-2 gap-4">
              {/* 動態決定選單的左右順序 */}
              {shouldSwapMenu ? (
                <>
                  {componentMenu}
                  {radicalMenu}
                </>
              ) : (
                <>
                  {radicalMenu}
                  {componentMenu}
                </>
              )}
            </div>
          </div>

          <div className="mt-8 mb-10 z-10 flex flex-col items-center w-full">
            {isRevealed ? (
              <>
                <div className={`text-2xl md:text-3xl font-bold mb-4 ${status === 'success' ? 'text-green-600' : 'text-red-600'} animate-pulse`}>{status === 'success' ? '答對了！太厲害了！' : '很可惜，正確答案是這個喔！'}</div>
                <button onClick={nextQuestion} className="px-10 py-4 rounded-full text-xl md:text-2xl font-bold text-white shadow-lg transition-transform bg-green-500 hover:bg-green-600 active:scale-95 animate-bounce">{qIndex < 9 ? '下一題 👉' : '看成績 🏆'}</button>
              </>
            ) : (
              <button onClick={checkAnswer} disabled={!slotRadical || !slotComponent || status === 'error'} className={`px-10 py-4 rounded-full text-xl md:text-2xl font-bold text-white shadow-lg transition-transform ${(!slotRadical || !slotComponent) ? 'bg-gray-400 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-600 active:scale-95'}`}>組合看看！</button>
            )}
          </div>

          <div className="fixed bottom-4 z-40 h-8 text-red-500 font-bold text-xl md:text-2xl bg-white/90 px-6 py-1 rounded-full shadow-md transition-opacity duration-300" style={{ opacity: status === "error" ? 1 : 0, pointerEvents: 'none' }}>哎呀！組合錯誤了，再試一次！</div>
        </div>
      );
    };

    // ==========================================
    // 系統功能：文字列表 (部首字典)
    // ==========================================
    const DictionaryView = ({ goHome }) => {
      const [selectedRadical, setSelectedRadical] = useState(null);
      const scrollRef = useRef(null);
      useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [selectedRadical]);

      return (
        <div className="w-full max-w-5xl bg-white rounded-2xl shadow-lg p-6 border-4 border-emerald-200 flex flex-col h-[85vh]">
          <div className="flex justify-between items-center mb-6 border-b-2 border-emerald-100 pb-4">
            <h2 className="text-2xl md:text-3xl font-bold text-emerald-800">📖 文字列表 (共 {WORD_DATA.length} 字){selectedRadical && <span className="text-emerald-600 ml-2">- 「{selectedRadical}」部</span>}</h2>
            <div className="flex gap-2">
              {selectedRadical && <button onClick={() => setSelectedRadical(null)} className="text-emerald-600 font-bold hover:text-emerald-800 bg-emerald-50 hover:bg-emerald-100 px-3 md:px-4 py-2 rounded-lg transition-colors">返回部首</button>}
              <button onClick={goHome} className="text-emerald-600 font-bold hover:text-emerald-800 bg-emerald-50 hover:bg-emerald-100 px-3 md:px-4 py-2 rounded-lg transition-colors">回首頁</button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto pr-2" ref={scrollRef}>
            {!selectedRadical ? (
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                {ALL_RADICALS.map(r => (
                  <button key={r} onClick={() => setSelectedRadical(r)} className="flex flex-col items-center justify-center p-4 rounded-2xl bg-emerald-50 text-emerald-700 hover:bg-emerald-500 hover:text-white transition-all shadow-sm active:scale-95 border-2 border-emerald-100 hover:border-emerald-500">
                    <span className="text-4xl md:text-5xl font-bold mb-2">{r}</span>
                    <div className="text-xs md:text-sm font-bold mb-1 text-center line-clamp-1">{RADICAL_DESC[r] || "漢字部首"}</div>
                    <span className="text-xs font-medium opacity-80 bg-white/50 px-2 py-0.5 rounded-full text-emerald-800">{WORD_DATA.filter(w => w.radical === r).length} 字</span>
                  </button>
                ))}
              </div>
            ) : (
              <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                {WORD_DATA.filter(w => w.radical === selectedRadical).map(w => (
                  <div key={w.char} className="bg-emerald-50 rounded-xl p-4 flex items-center gap-4 shadow-sm border border-emerald-100 transition-transform hover:scale-[1.02] relative overflow-hidden">
                    <div className={`absolute top-0 right-0 ${w.levelColor} text-white text-[10px] px-2 py-0.5 rounded-bl-lg font-bold shadow-sm`}>{w.levelLabel}</div>
                    <div className="flex items-center justify-center bg-white min-w-[80px] h-20 rounded-lg shadow-inner text-5xl font-bold text-emerald-800 border border-emerald-200">{w.char}</div>
                    <div className="flex items-center"><VerticalZhuyin bopomofo={w.bopomofo} size="lg" /></div>
                    <div className="ml-2 flex-1">
                      <div className="text-emerald-600 text-sm font-bold mb-1 tracking-wider">{w.radical} ＋ {w.component}</div>
                      <div className="text-gray-800 font-medium text-sm leading-snug">{w.mean}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    // ==========================================
    // 主程式
    // ==========================================
    function App() {
      const [currentView, setCurrentView] = useState('menu');
      const renderView = () => {
        switch(currentView) {
          case 'mode4': return <Mode4Game goHome={() => setCurrentView('menu')} />;
          case 'dictionary': return <DictionaryView goHome={() => setCurrentView('menu')} />;
          default: return (
              <div className="flex flex-col items-center justify-center w-full max-w-xl bg-white rounded-3xl shadow-xl p-8 md:p-12 border-4 border-amber-300 my-auto">
                <h1 className="text-5xl md:text-6xl font-bold text-amber-800 mb-2">繁體中文工坊</h1>
                <p className="text-xl md:text-2xl text-amber-600 mb-10 font-medium tracking-widest">部首與偏旁的鍊金術</p>
                <div className="flex flex-col gap-6 w-full">
                  <MenuBtn title="📝 情境填空" sub="幫句子找到對的字" onClick={() => setCurrentView('mode4')} highlight />
                  <MenuBtn title="📖 文字列表" sub="預習與複習的好幫手" onClick={() => setCurrentView('dictionary')} color="emerald" />
                </div>
              </div>
            );
        }
      };

      return (
        <div className="min-h-screen bg-[#FDFBF7] font-sans text-gray-800 flex flex-col items-center justify-start py-6 px-4">
          {renderView()}
        </div>
      );
    }

    const MenuBtn = ({ title, sub, onClick, highlight, color = "amber" }) => {
      const baseColor = color === "amber" ? "bg-amber-50 hover:bg-amber-100 border-amber-300" : "bg-emerald-50 hover:bg-emerald-100 border-emerald-300";
      const textColor = color === "amber" ? "text-amber-800" : "text-emerald-800";
      const hlClass = highlight ? "ring-4 ring-amber-400 transform scale-105" : "";
      return (
        <button onClick={onClick} className={`w-full flex flex-col items-center justify-center p-6 rounded-2xl border-2 transition-all hover:shadow-md active:scale-95 ${baseColor} ${hlClass}`}>
          <span className={`text-2xl font-bold ${textColor} mb-2`}>{title}</span>
          <span className="text-gray-500 font-medium">{sub}</span>
        </button>
      );
    }

    // 啟動 React 應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
